name: nyumba_hub_tanzania
description: "Property Rental & Services Platform for Tanzania"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  
  # State Management
  provider: ^6.0.0
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  video_player: ^2.8.0
  
  # Location & Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0
  
  # Chat & Real-time
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Utils
  http: ^1.1.0
  dio: ^5.3.0
  shared_preferences: ^2.2.2
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
